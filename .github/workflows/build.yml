name: Build DuckStation with SIE Enhanced Draw Distance
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Clone DuckStation
        run: git clone --depth 1 https://github.com/stenzek/DuckStation.git duckstation
        shell: cmd

      - name: Apply SIE patches
        shell: python
        run: |
          import os, re

          # ------------------------------------------------------------
          # 1. Create the SIE helper library (sie.h / sie.cpp)
          # ------------------------------------------------------------
          os.makedirs('duckstation/src/sise', exist_ok=True)

          with open('duckstation/src/sise/sie.h', 'w') as f:
              f.write("""#pragma once
          namespace SIE {
              extern bool g_enabled;
              extern unsigned g_z_scale;
              void ScaleGTERegister(unsigned idx, unsigned& value);
          }
          """)

          with open('duckstation/src/sise/sie.cpp', 'w') as f:
              f.write("""#include "sise/sie.h"
          #include "core/core.h"
          namespace SIE {
              bool g_enabled = false;
              unsigned g_z_scale = 1;
              void ScaleGTERegister(unsigned idx, unsigned& value) {
                  if (!g_enabled || g_z_scale <= 1) return;
                  if (idx == 7 || (idx >= 16 && idx <= 19)) {
                      unsigned z = value & 0xFFFF;
                      if (z > 100) {
                          z /= g_z_scale;
                          if (z < 1) z = 1;
                      }
                      value = (value & 0xFFFF0000) | (z & 0xFFFF);
                  }
              }
          }
          """)

          # ------------------------------------------------------------
          # 2. Patch cpu_core.cpp – interpreter blocks
          # ------------------------------------------------------------
          cp_path = 'duckstation/src/core/cpu_core.cpp'
          with open(cp_path, 'r') as f:
              lines = f.readlines()

          new_lines = []
          for line in lines:
              new_lines.append(line)
              if line.strip() == '#include "gte.h"':
                  new_lines.append('#include "sise/sie.h"\n')
          lines = new_lines

          def patch_block(case_label, read_pattern, write_pattern, lines_list):
              in_block = False
              result = []
              for line in lines_list:
                  if case_label in line:
                      in_block = True
                  elif line.strip().startswith(('case ', 'default:')) and in_block:
                      in_block = False

                  if in_block and read_pattern in line:
                      indent = line[:len(line) - len(line.lstrip())]
                      result.append(line)
                      result.append(f'{indent}u32 scaled_value = value;\n')
                      result.append(f'{indent}SIE::ScaleGTERegister(static_cast<u32>(inst.r.rd.GetValue()), scaled_value);\n')
                  elif in_block and write_pattern in line:
                      result.append(line.replace('value', 'scaled_value'))
                  else:
                      result.append(line)
              return result

          lines = patch_block('case MFC2:',
                              'GTE::ReadRegister(static_cast<u32>(inst.r.rd.GetValue()))',
                              'WriteRegDelayed(inst.r.rt, value);',
                              lines)

          lines = patch_block('case SWC2:',
                              'GTE::ReadRegister(ZeroExtend32(static_cast<u8>(inst.i.rt.GetValue())))',
                              'WriteMemoryWord(addr, value);',
                              lines)

          with open(cp_path, 'w') as f:
              f.writelines(lines)

          # ------------------------------------------------------------
          # 3. Patch gte.cpp – OTZ scaling + recompiler helper
          # ------------------------------------------------------------
          gte_path = 'duckstation/src/core/gte.cpp'
          with open(gte_path, 'r') as f:
              gte = f.read()

          gte = gte.replace('#include "gte.h"', '#include "gte.h"\n#include "sise/sie.h"')

          if 'ScaleZRegister' not in gte:
              gte = gte.replace('} // namespace GTE',
                                'u32 ScaleZRegister(u32 idx, u32 value) {\n'
                                '    SIE::ScaleGTERegister(idx, value);\n'
                                '    return value;\n'
                                '}\n'
                                '} // namespace GTE')

          if 'const u16 otz = TruncateToU16(m_mac[0] >> 12);' in gte:
              gte = gte.replace('const u16 otz = TruncateToU16(m_mac[0] >> 12);',
                                'const u16 otz = TruncateToU16(m_mac[0] >> 12);\n'
                                '          if (SIE::g_enabled && SIE::g_z_scale > 1) {\n'
                                '            u32 scaled_otz = otz / SIE::g_z_scale;\n'
                                '            m_mac[0] = (m_mac[0] & ~0xFFFF) | (scaled_otz & 0xFFFF);\n'
                                '          }')
          with open(gte_path, 'w') as f:
              f.write(gte)

          # ------------------------------------------------------------
          # 4. Recompiler patch (if file exists)
          # ------------------------------------------------------------
          rc_path = None
          for candidate in ['duckstation/src/core/cpu_recompiler_codegen.cpp',
                            'duckstation/src/core/cpu_recompiler_codegen_x86.cpp',
                            'duckstation/src/core/cpu_recompiler.cpp']:
              if os.path.exists(candidate):
                  rc_path = candidate
                  break
          if rc_path:
              with open(rc_path, 'r') as f:
                  rc = f.read()
              rc = rc.replace(
                  'Value val = CallCFunc(&GTE::ReadRegister, MakeRegParam(idx));',
                  'Value original_val = CallCFunc(&GTE::ReadRegister, MakeRegParam(idx));\n'
                  '              Value val = CallCFunc(&GTE::ScaleZRegister, MakeRegParam(idx), original_val);')
              rc = rc.replace(
                  'CallCFunc(&PGXP::CPU_MFC2, MakeRegParam(inst.bits), val);',
                  'CallCFunc(&PGXP::CPU_MFC2, MakeRegParam(inst.bits), original_val);')
              with open(rc_path, 'w') as f:
                  f.write(rc)

          # ------------------------------------------------------------
          # 5. UI widget (checkbox + slider) with correct precompiled header
          # ------------------------------------------------------------
          ui_h = 'duckstation/src/duckstation-qt/sisesettingswidget.h'
          with open(ui_h, 'w') as f:
              f.write("""#pragma once
          #include <QWidget>

          class QCheckBox;
          class QLabel;
          class QSlider;

          class SIESettingsWidget : public QWidget
          {
              Q_OBJECT
          public:
              explicit SIESettingsWidget(QWidget* parent = nullptr);
          private:
              void updateStatus();
              QCheckBox* m_enabled;
              QSlider* m_scaleSlider;
              QLabel* m_scaleLabel;
              QLabel* m_statusLabel;
          };""")

          ui_cpp = 'duckstation/src/duckstation-qt/sisesettingswidget.cpp'
          with open(ui_cpp, 'w') as f:
              f.write('''#include "pch.h"
          #include "sisesettingswidget.h"
          #include "settingswidgetbinder.h"
          #include "core/core.h"
          #include <QCheckBox>
          #include <QFormLayout>
          #include <QGroupBox>
          #include <QHBoxLayout>
          #include <QLabel>
          #include <QSlider>
          #include <QVBoxLayout>

          SIESettingsWidget::SIESettingsWidget(QWidget* parent)
              : QWidget(parent)
          {
              auto* mainLayout = new QVBoxLayout(this);
              auto* group = new QGroupBox(tr("Enhanced Draw Distance (SIE)"), this);
              auto* form = new QFormLayout(group);

              m_enabled = new QCheckBox(tr("Enable Z-scaling"), group);
              SettingsWidgetBinder::BindWidgetToBoolSetting(nullptr, m_enabled, "sise", "enabled", true);
              form->addRow(m_enabled);

              auto* scaleLayout = new QHBoxLayout();
              m_scaleSlider = new QSlider(Qt::Horizontal, group);
              m_scaleSlider->setRange(1, 16);
              m_scaleSlider->setValue(4);
              m_scaleLabel = new QLabel("4x", group);
              m_scaleLabel->setMinimumWidth(40);
              scaleLayout->addWidget(m_scaleSlider);
              scaleLayout->addWidget(m_scaleLabel);
              form->addRow(tr("Multiplier:"), scaleLayout);

              m_statusLabel = new QLabel(group);
              m_statusLabel->setWordWrap(true);
              m_statusLabel->setStyleSheet("padding:8px; background:rgba(0,0,0,0.1); border-radius:4px;");
              form->addRow(tr("Status:"), m_statusLabel);

              mainLayout->addWidget(group);
              mainLayout->addStretch(1);

              connect(m_enabled, &QCheckBox::toggled, this, &SIESettingsWidget::updateStatus);
              connect(m_scaleSlider, &QSlider::valueChanged, [this](int v) {
                  m_scaleLabel->setText(QString("%1x").arg(v));
                  Core::SetBaseFloatSettingValue("sise", "z_scale_factor", static_cast<float>(v));
                  updateStatus();
              });

              updateStatus();
          }

          void SIESettingsWidget::updateStatus()
          {
              if (!m_enabled->isChecked())
                  m_statusLabel->setText(tr("<b style='color:gray'>OFF</b> – Original draw distance."));
              else
                  m_statusLabel->setText(tr("<b style='color:green'>ON</b> – Draw distance x%1.").arg(m_scaleSlider->value()));
          }''')

          # Register widget in settingswindow.cpp
          sw = 'duckstation/src/duckstation-qt/settingswindow.cpp'
          if os.path.exists(sw):
              with open(sw, 'r') as f:
                  sc = f.read()
              sc = sc.replace('#include "graphicssettingswidget.h"',
                              '#include "sisesettingswidget.h"\n#include "graphicssettingswidget.h"')
              sc = sc.replace('addWidget(new GraphicsSettingsWidget',
                              'addWidget(new SIESettingsWidget(m_ui.settingsContainer),\n'
                              '          tr("Enhanced Draw Distance"),\n'
                              '          u":/icons/monochrome/svg/eye-line.svg"_s,\n'
                              '          tr("<strong>Enhanced Draw Distance</strong><hr>'
                              'Extends draw distance by scaling depth values."));\n'
                              '  addWidget(new GraphicsSettingsWidget')
              with open(sw, 'w') as f:
                  f.write(sc)

          # Update .vcxproj files
          vcx = 'duckstation/src/duckstation-qt/duckstation-qt.vcxproj'
          if os.path.exists(vcx):
              with open(vcx, 'r') as f:
                  vc = f.read()
              vc = vc.replace('<ClCompile Include="settingswindow.cpp" />',
                              '<ClCompile Include="settingswindow.cpp" />\n    <ClCompile Include="sisesettingswidget.cpp" />')
              vc = vc.replace('<ClInclude Include="settingswindow.h" />',
                              '<ClInclude Include="settingswindow.h" />\n    <ClInclude Include="sisesettingswidget.h" />')
              with open(vcx, 'w') as f:
                  f.write(vc)

          core_vcx = 'duckstation/src/core/core.vcxproj'
          if os.path.exists(core_vcx):
              with open(core_vcx, 'r') as f:
                  cvc = f.read()
              cvc = cvc.replace('<ClCompile Include="gte.cpp" />',
                                '<ClCompile Include="gte.cpp" />\n    <ClCompile Include="..\\sise\\sie.cpp" />')
              cvc = cvc.replace('<ClInclude Include="gte.h" />',
                                '<ClInclude Include="gte.h" />\n    <ClInclude Include="..\\sise\\sie.h" />')
              with open(core_vcx, 'w') as f:
                  f.write(cvc)

          print("All SIE patches applied successfully.")

      - name: Download prebuilt dependencies
        shell: cmd
        run: |
          curl -sL -o deps.7z "https://github.com/duckstation/dependencies/releases/latest/download/deps-windows-x64.7z"
          mkdir duckstation\dep\prebuilt 2>nul
          7z x deps.7z -oduckstation\dep\prebuilt -y

      - name: Build
        shell: powershell
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe
          cd duckstation
          & $msbuild duckstation.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

      - name: Package
        shell: cmd
        run: |
          echo. > duckstation\bin\x64\portable.txt
          (echo [sise] && echo enabled=true && echo z_scale_factor=4.0 && echo show_overlay=true) > duckstation\bin\x64\settings.ini
          7z a duckstation-sie.7z duckstation\bin\x64\*

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: duckstation-sie
          path: duckstation-sie.7z
