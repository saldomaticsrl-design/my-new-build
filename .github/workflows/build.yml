name: Build DuckStation with Enhanced Draw Distance (Patcher + SIE)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Clone DuckStation
        run: git clone --depth 1 https://github.com/stenzek/DuckStation.git duckstation
        shell: cmd

      - name: Apply all enhancements (MIPS patcher + SIE + ImGui UI)
        shell: python
        run: |
          import os, re

          # ============================================================
          # 1. cpu_core.cpp – add SIE Z-scaling (interpreter only)
          # ============================================================
          cp = 'duckstation/src/core/cpu_core.cpp'
          with open(cp, 'r') as f:
              cc = f.read()

          sie_impl = '''
          // ----- SIE Z-scaling (interpreter-only, PGXP safe) -----
          namespace SIE {
              static bool s_enabled = true;
              static u32 s_scale = 4;
              void SetEnabled(bool e) { s_enabled = e; }
              bool IsEnabled() { return s_enabled; }
              void SetScale(u32 s) { s_scale = s; }
              u32 GetScale() { return s_scale; }
              void ScaleRegister(u32 idx, u32& value) {
                  if (!s_enabled || s_scale <= 1) return;
                  if (idx == 7 || (idx >= 16 && idx <= 19)) {
                      u16 z = (u16)(value & 0xFFFF);
                      if (z > 100) {
                          z = (u16)(z / s_scale);
                          if (z < 1) z = 1;
                      }
                      value = (value & 0xFFFF0000) | z;
                  }
              }
          }
          '''
          cc = cc.replace('#include "gte.h"', '#include "gte.h"\n' + sie_impl)

          # Replace MFC2 read (non-const value, then scale)
          cc = cc.replace(
              'const u32 value = GTE::ReadRegister(static_cast<u32>(inst.r.rd.GetValue()));',
              '''u32 value = GTE::ReadRegister(static_cast<u32>(inst.r.rd.GetValue()));
          SIE::ScaleRegister(static_cast<u32>(inst.r.rd.GetValue()), value);'''
          )

          # Replace SWC2 read
          cc = cc.replace(
              'const u32 value = GTE::ReadRegister(ZeroExtend32(static_cast<u8>(inst.i.rt.GetValue())));',
              '''u32 value = GTE::ReadRegister(ZeroExtend32(static_cast<u8>(inst.i.rt.GetValue())));
          SIE::ScaleRegister(ZeroExtend32(static_cast<u8>(inst.i.rt.GetValue())), value);'''
          )

          with open(cp, 'w') as f:
              f.write(cc)

          # ============================================================
          # 2. imgui_overlays.cpp – add MIPS patcher & combined UI
          # ============================================================
          imgui = 'duckstation/src/core/imgui_overlays.cpp'
          with open(imgui, 'r') as f:
              ic = f.read()

          # Add bus.h include (needed for Bus::g_ram)
          ic = ic.replace('#include "common/log.h"', '#include "common/log.h"\n#include "bus.h"')

          # MIPS patcher code
          patcher_code = '''
          // ----- MIPS auto-patcher for draw distance -----
          namespace DrawDistancePatcher {
              static bool   s_patched = false;
              static int    s_patch_count = 0;
              static const u32 kMaxPatch = 0x7FFF;

              void ScanAndPatch() {
                  if (s_patched) return;
                  if (!Bus::g_ram || Bus::g_ram_size < 2048) return;

                  const u8* ram = Bus::g_ram;
                  u32 text_addr = 0, text_size = 0;
                  const u8 magic[8] = {'P','S','-','X',' ','E','X','E'};
                  for (u32 i = 0; i < Bus::g_ram_size - 0x800; ++i) {
                      if (!memcmp(ram + i, magic, 8)) {
                          const u8* h = ram + i;
                          text_addr = h[0x18] | (h[0x19]<<8) | (h[0x1A]<<16) | (h[0x1B]<<24);
                          text_size = h[0x1C] | (h[0x1D]<<8) | (h[0x1E]<<16) | (h[0x1F]<<24);
                          break;
                      }
                  }
                  if (text_size == 0 || text_addr + text_size > Bus::g_ram_size) return;

                  const u8* code = ram + text_addr;
                  for (u32 off = 0; off + 12 <= text_size; off += 4) {
                      u32 w = *(u32*)(code + off);
                      u32 op = w >> 26;
                      if (op != 0x0A && op != 0x0B) continue;
                      int16_t imm = (int16_t)(w & 0xFFFF);
                      if (imm < 100 || imm > 2000) continue;
                      u32 rt = (w >> 16) & 0x1F;
                      for (u32 j = 1; j <= 3 && off + j*4 + 4 <= text_size; ++j) {
                          u32 bw = *(u32*)(code + off + j*4);
                          u32 bop = bw >> 26;
                          u32 bfunct = bw & 0x3F;
                          bool hit = false;
                          if ((bop == 0x04 || bop == 0x05) && (((bw>>21)&0x1F)==rt || ((bw>>16)&0x1F)==rt)) hit = true;
                          else if ((bop == 0x06 || bop == 0x07) && ((bw>>21)&0x1F)==rt) hit = true;
                          else if (bop == 0x01 && (bfunct==0x00||bfunct==0x01) && ((bw>>21)&0x1F)==rt) hit = true;
                          if (hit) {
                              *(u32*)(Bus::g_ram + text_addr + off) = (w & 0xFFFF0000) | (kMaxPatch & 0xFFFF);
                              ++s_patch_count;
                              break;
                          }
                      }
                  }
                  s_patched = true;
              }

              bool IsPatched() { return s_patched; }
              int  GetPatchCount() { return s_patch_count; }
          }
          '''
          # Insert patcher code after the bus.h include
          ic = ic.replace('#include "bus.h"', '#include "bus.h"\n' + patcher_code)

          # ImGui window appended at the end of the file
          overlay_window = '''
          void DrawEnhancedDrawDistanceWindow()
          {
              ImGui::SetNextWindowSize(ImVec2(350, 200), ImGuiCond_FirstUseEver);
              if (ImGui::Begin("Enhanced Draw Distance", nullptr, ImGuiWindowFlags_NoCollapse))
              {
                  if (ImGui::Button("Scan & Patch (MIPS)"))
                      DrawDistancePatcher::ScanAndPatch();
                  ImGui::SameLine();
                  ImGui::Text("Patches: %d", DrawDistancePatcher::GetPatchCount());

                  bool sie = SIE::IsEnabled();
                  if (ImGui::Checkbox("Z-scaling (SIE)", &sie))
                      SIE::SetEnabled(sie);
                  if (sie) {
                      int scale = (int)SIE::GetScale();
                      ImGui::SliderInt("Multiplier", &scale, 1, 16);
                      if (scale != (int)SIE::GetScale())
                          SIE::SetScale((u32)scale);
                  }

                  ImGui::Separator();
                  ImGui::TextColored(ImVec4(1,1,0,1), "%s %s",
                      DrawDistancePatcher::IsPatched() ? "PATCHER ON" : "PATCHER OFF",
                      SIE::IsEnabled() ? "SIE ON" : "SIE OFF");
              }
              ImGui::End();
          }
          '''
          ic += overlay_window

          # Insert a call to the new window in the overlay loop (after DrawInputsOverlay)
          ic = ic.replace('DrawInputsOverlay();', 'DrawInputsOverlay();\n  DrawEnhancedDrawDistanceWindow();')

          with open(imgui, 'w') as f:
              f.write(ic)

          print("All enhancements applied – no new files, no project modifications.")

      - name: Download prebuilt dependencies
        shell: cmd
        run: |
          curl -sL -o deps.7z "https://github.com/duckstation/dependencies/releases/latest/download/deps-windows-x64.7z"
          mkdir duckstation\dep\prebuilt 2>nul
          7z x deps.7z -oduckstation\dep\prebuilt -y

      - name: Build
        shell: powershell
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe
          cd duckstation
          & $msbuild duckstation.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

      - name: Package
        shell: cmd
        run: |
          echo. > duckstation\bin\x64\portable.txt
          (echo [sise] && echo enabled=true && echo z_scale_factor=4.0 && echo show_overlay=true) > duckstation\bin\x64\settings.ini
          7z a duckstation-enhanced.7z duckstation\bin\x64\*

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: duckstation-enhanced
          path: duckstation-enhanced.7z
